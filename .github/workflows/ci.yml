name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pii-scan:
    name: PII Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Scan src/ for PII
        run: node scripts/detect-pii.js src/
      - name: Scan .env.example for PII
        run: node scripts/detect-pii.js .env.example
